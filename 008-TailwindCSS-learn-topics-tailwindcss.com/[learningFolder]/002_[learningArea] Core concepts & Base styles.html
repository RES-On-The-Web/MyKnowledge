
<!-- Styling with utility classes -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/style.css">
</head>
<body>

    <div class="bg-white m-5   max-w-sm mx-auto p-5   shadow-lg rounded-xl   flex gap-5 shrink-0   items-center">
        <img class="size-17 shrink-0" src="./000_[miscellaneousArea]/chaticon.jpeg" alt="a chat icon">
        <div>
            <div class="font-medium text-xl text-black">ChitChat</div>
            <p class="text-gray-700 ">You have a new message!</p>
        </div>
    </div>


    <div class="bg-white border border-gray-100   flex py-3 px-5   max-w-sm mx-auto   rounded-xl shadow-lg   gap-5   max-sm:flex-col max-sm:items-center max-sm:gap-0 max-sm:py-8">
        <img src="./000_[miscellaneousArea]/orangeface.jpeg" alt="face">
        <div class="space-y-3 max-sm:text-center">
            <div class="space-y-1 mt-1    max-sm:items-center">
                <div class="font-semibold text-lg">Erin Lindford</div>
                <p class="font-medium text-gray-600/85 text-[15px]">Product Engineer</p>
            </div>
            <button class="text-purple-600 font-bold  border border-purple-200 rounded-2xl px-4.5 py-0.5   hover:bg-purple-600 hover:text-white">Message</button>
        </div>
    </div>


    <div class="space-y-2    bg-gray-900    h-75 w-110    mx-auto mt-4   px-9 pt-6 pb-13">
        <div class="    text-gray-400    text-sm   pl-0.5">Dark mode</div>
        <div class="    bg-gray-800    w-full h-full   rounded-lg   flex flex-col   px-6 py-8">
            <div class="     bg-blue-700    h-10 w-10    rounded-lg"></div>
            <h3 class="   text-white    mt-5.5 mb-2">Writes upside-down</h3>
            <p class="    text-gray-400    text-sm">The Zero Gravity Pen can be used to write in any orientation, including upside-down. It even works in outer space.</p>
        </div>
    </div>

</body>
</html>

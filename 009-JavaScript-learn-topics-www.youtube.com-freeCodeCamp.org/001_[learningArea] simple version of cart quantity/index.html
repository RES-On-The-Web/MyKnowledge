<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocumentE</title>
    <script defer src="script.js"></script>
    
</head>
<body>
    <button onclick="
        console.log(`Cart Quantity:  ${cartQuantity}`)
    ">show quantity</button>

    <button onclick="
        cartQuantity+=1;
        console.log(`Cart Quantity:  ${cartQuantity}`);
    ">add to cart</button>

    <button onclick="
        cartQuantity+=2;
        console.log(`Cart Quantity:  ${cartQuantity}`);
    ">+2</button>

    <button onclick="
        cartQuantity+=3;
        console.log(`Cart Quantity:  ${cartQuantity}`);
    ">+3</button>

    <button onclick="
        cartQuantity=0;
        console.log(`Cart Quantity:  ${cartQuantity}`);
    ">reset cart</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .red { background-color: rgb(255, 0, 0); color: white;}
    </style>
</head>
<body>


    <h1>Rock Paper Scissors</h1>
    <div class="wrapper-rps-game">
        <button onclick="playGame('Rock')"><img src="./Rock-image.png" alt="rock" class="rock-buton"></button>
        <button onclick="playGame('Paper')"><img src="./Paper-image.png" alt="paper" class="paper-buton"></button>
        <button onclick="playGame('Scissors')"><img src="./Scissors-image.png" alt="scissors" class="scissors-buton"></button>
    </div>
    <h2 class="resultresult">-result-</h2>
    <p class="result">-result-<br>-result-</p>
    <button onclick="resetScore()">Reset Scores</button>
    <button onclick="autoPlay()" class="auto-play">Auto Play</button>


</body>
</html>
